<!-- Add this modal at the end of views/scholarships.html -->
<!-- General Modal Dialog Wrapper (Hidden by default) -->
<div id="scholarship-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div class="card" style="width: 90%; max-width: 400px; padding: 24px; position: relative;">
        <button id="close-sch-modal-btn" class="icon-btn" style="position: absolute; top: 16px; right: 16px;">
            <i class="icon-x"></i>
        </button>
        
        <h2 style="margin: 0 0 24px 0; font-size: 18px; font-weight: 700;" id="sch-modal-title">Add Scholarship</h2>
        
        <form id="scholarship-form" style="display: flex; flex-direction: column; gap: 16px;">
            <div>
                <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px;">Program Name (e.g. TES) <span style="color:red">*</span></label>
                <input type="text" id="sch-inp-name" required style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 10px; background: rgba(0,0,0,0.02); outline: none; font-family: inherit;">
            </div>
            
            <div>
                <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px;">Description</label>
                <textarea id="sch-inp-desc" rows="2" style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 10px; background: rgba(0,0,0,0.02); outline: none; font-family: inherit; resize: vertical;"></textarea>
            </div>
            
            <div>
                <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px;">Required Documents (comma separated)</label>
                <textarea id="sch-inp-docs" rows="3" placeholder="e.g. ID Card, Enrollment Form" style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 10px; background: rgba(0,0,0,0.02); outline: none; font-family: inherit; resize: vertical;"></textarea>
            </div>
            
            <label style="display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 12px; background: rgba(0,0,0,0.02); border-radius: 10px; border: 1px solid var(--border-color);">
                <input type="checkbox" id="sch-inp-active" checked style="width: 18px; height: 18px; accent-color: var(--primary-color);">
                <span style="font-size: 14px; font-weight: 500;">Active Status</span>
            </label>

            <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 16px;">
                <button type="button" class="btn btn-outline" id="sch-modal-cancel-btn">Cancel</button>
                <button type="submit" class="btn btn-primary" id="sch-modal-save-btn">Save</button>
            </div>
        </form>
    </div>
</div>
