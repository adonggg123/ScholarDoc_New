<div class="view-content" style="display: flex; flex-direction: column; gap: 24px; height: 100%;">
    <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;">
        <div>
            <h2 style="margin: 0 0 4px 0; font-size: 24px; font-weight: 800;">Announcements</h2>
            <p style="margin: 0; color: var(--text-secondary); font-size: 13px;">Manage announcements sent to scholars.</p>
        </div>
        <button class="btn btn-primary" id="btn-add-ann">
            <i class="icon-megaphone" style="font-size: 16px;"></i> Post New Update
        </button>
    </div>

    <!-- Data List -->
    <div class="card" style="flex: 1; overflow-y: auto; padding: 0;">
        <div id="announcements-list" style="display: flex; flex-direction: column;">
            <div style="text-align: center; padding: 40px; color: var(--text-secondary);">Loading announcements...</div>
        </div>
    </div>
</div>

<!-- Modal Dialog Wrapper -->
<div id="ann-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div class="card" style="width: 90%; max-width: 480px; padding: 24px; position: relative;">
        <button id="close-ann-modal-btn" class="icon-btn" style="position: absolute; top: 16px; right: 16px;">
            <i class="icon-x"></i>
        </button>
        
        <h2 style="margin: 0 0 24px 0; font-size: 18px; font-weight: 700;" id="ann-modal-title">Post Announcement</h2>
        
        <form id="ann-form" style="display: flex; flex-direction: column; gap: 16px;">
            <div>
                <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px;">Category</label>
                <div style="display: flex; gap: 8px;">
                    <label style="flex: 1; cursor: pointer;">
                        <input type="radio" name="ann-type" value="General" checked style="display: none;">
                        <div class="type-btn" style="text-align: center; padding: 10px; border: 1.5px solid var(--border-color); border-radius: 10px; font-size: 12px; font-weight: 600;">General</div>
                    </label>
                    <label style="flex: 1; cursor: pointer;">
                        <input type="radio" name="ann-type" value="Update" style="display: none;">
                        <div class="type-btn" style="text-align: center; padding: 10px; border: 1.5px solid var(--border-color); border-radius: 10px; font-size: 12px; font-weight: 600;">Update</div>
                    </label>
                    <label style="flex: 1; cursor: pointer;">
                        <input type="radio" name="ann-type" value="Deadline" style="display: none;">
                        <div class="type-btn" style="text-align: center; padding: 10px; border: 1.5px solid var(--border-color); border-radius: 10px; font-size: 12px; font-weight: 600;">Deadline</div>
                    </label>
                </div>
            </div>
            
            <div>
                <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px;">Announcement Title <span style="color:red">*</span></label>
                <input type="text" id="ann-inp-title" required placeholder="Enter a catchy title..." style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 10px; background: rgba(0,0,0,0.02); outline: none; font-family: inherit;">
            </div>
            
            <div>
                <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px;">Message Body <span style="color:red">*</span></label>
                <textarea id="ann-inp-content" required rows="4" placeholder="Type your announcement details here..." style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 10px; background: rgba(0,0,0,0.02); outline: none; font-family: inherit; resize: vertical;"></textarea>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 16px;">
                <button type="button" class="btn btn-outline" id="ann-modal-cancel-btn">Cancel</button>
                <button type="submit" class="btn btn-primary" id="ann-modal-save-btn">Post</button>
            </div>
        </form>
    </div>
</div>

<style>
    /* Styling for the custom radio buttons to match flutter */
    input[type="radio"]:checked + .type-btn {
        background-color: rgba(15, 50, 96, 0.1); /* Primary tinted by default, JS updates it */
        border-color: var(--primary-color);
        color: var(--primary-color);
    }
</style>
