<div class="view-content" style="display: flex; flex-direction: column; gap: 24px; height: 100%; overflow-y: auto;">
    <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;">
        <div>
            <h2 style="margin: 0 0 4px 0; font-size: 24px; font-weight: 800;">ID Validation Queue</h2>
            <p style="margin: 0; color: var(--text-secondary); font-size: 13px;">Validate student IDs and signatures for application finalization.</p>

    </div>

    <div style="display: grid; grid-template-columns: 3fr 2fr; gap: 24px; align-items: start;" id="id-grid">

        <div class="card" style="box-shadow: 0 2px 8px rgba(0,0,0,0.03); position: sticky; top: 0;" id="id-panel-container">

        </div>

    </div>
</div>

        #id-grid {
            grid-template-columns: 1fr !important;

        #id-panel-container {

    }
    .id-list-item {
        transition: background 0.2s;
        cursor: pointer;
